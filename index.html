<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arte Generativo</title>
<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #0a0a12;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
}

.app {
  position: relative;
  width: 100vw;
  height: 100vh;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
  cursor: crosshair;
  touch-action: none;
}

.panel {
  position: absolute;
  top: 16px;
  left: 16px;
  background: rgba(20, 20, 30, 0.75);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 14px;
  padding: 18px 20px;
  color: #eee;
  width: 240px;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
}

.panel h1 {
  font-size: 16px;
  margin: 0 0 14px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.panel label {
  display: block;
  font-size: 12px;
  color: #bbb;
  margin-bottom: 10px;
}

.panel input[type="range"] {
  width: 100%;
  margin-top: 4px;
  accent-color: #7fdbff;
}

.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 14px;
}

.buttons button {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #eee;
  border-radius: 8px;
  padding: 8px 6px;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s ease;
}

.buttons button:hover {
  background: rgba(255, 255, 255, 0.18);
}

.hint {
  font-size: 11px;
  color: #888;
  margin: 12px 0 0;
  line-height: 1.4;
}
</style>
</head>
<body>
  <div class="app">
    <canvas id="canvas"></canvas>

    <div class="panel">
      <h1>✨ Arte Generativo</h1>

      <label>
        Color (matiz)
        <input type="range" id="hue" min="0" max="360" value="200">
      </label>

      <label>
        Velocidad
        <input type="range" id="speed" min="1" max="20" value="6">
      </label>

      <label>
        Tamaño
        <input type="range" id="size" min="1" max="40" value="12">
      </label>

      <label>
        Simetría (espejos)
        <input type="range" id="symmetry" min="1" max="12" value="6">
      </label>

      <label>
        Estela (persistencia)
        <input type="range" id="trail" min="1" max="30" value="6">
      </label>

      <div class="buttons">
        <button id="randomize">🎲 Aleatorio</button>
        <button id="clear">🧹 Limpiar</button>
        <button id="pause">⏸ Pausar</button>
        <button id="save">💾 Guardar PNG</button>
      </div>

      <p class="hint">Mueve el mouse (o el dedo) sobre el lienzo para dibujar.</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const hueEl = document.getElementById('hue');
    const speedEl = document.getElementById('speed');
    const sizeEl = document.getElementById('size');
    const symmetryEl = document.getElementById('symmetry');
    const trailEl = document.getElementById('trail');
    const randomizeBtn = document.getElementById('randomize');
    const clearBtn = document.getElementById('clear');
    const pauseBtn = document.getElementById('pause');
    const saveBtn = document.getElementById('save');

    let width, height, cx, cy;
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      cx = width / 2;
      cy = height / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, width, height);

    let particles = [];
    let paused = false;
    let pointerActive = false;
    let idleAngle = 0;

    class Particle {
      constructor(x, y, hue) {
        this.x = x;
        this.y = y;
        const speed = parseFloat(speedEl.value) * 0.15;
        const a = Math.random() * Math.PI * 2;
        this.vx = Math.cos(a) * speed;
        this.vy = Math.sin(a) * speed;
        this.hue = hue;
        this.size = parseFloat(sizeEl.value) * (0.4 + Math.random() * 0.8);
        this.life = 1;
        this.decay = 0.006 + Math.random() * 0.01;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
      }
      dead() {
        return this.life <= 0;
      }
    }

    function emit(x, y) {
      const baseHue = parseFloat(hueEl.value);
      for (let i = 0; i < 3; i++) {
        particles.push(new Particle(x, y, baseHue + (Math.random() * 40 - 20)));
      }
    }

    function drawParticle(p) {
      const radius = p.size * p.life;
      if (radius <= 0) return;

      const sym = parseInt(symmetryEl.value, 10);
      const relX = p.x - cx;
      const relY = p.y - cy;
      const dist = Math.sqrt(relX * relX + relY * relY);
      const baseAngle = Math.atan2(relY, relX);

      for (let i = 0; i < sym; i++) {
        const a = baseAngle + (Math.PI * 2 * i) / sym;
        const x = cx + Math.cos(a) * dist;
        const y = cy + Math.sin(a) * dist;

        ctx.beginPath();
        ctx.fillStyle = `hsla(${p.hue % 360}, 90%, 65%, ${Math.max(0, p.life)})`;
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function mapRange(v, inMin, inMax, outMin, outMax) {
      return outMin + ((v - inMin) * (outMax - outMin)) / (inMax - inMin);
    }

    function tick() {
      if (!paused) {
        const trailVal = parseFloat(trailEl.value);
        const fadeAlpha = mapRange(trailVal, 1, 30, 0.35, 0.015);
        ctx.fillStyle = `rgba(10, 10, 18, ${fadeAlpha})`;
        ctx.fillRect(0, 0, width, height);

        if (!pointerActive) {
          idleAngle += 0.01 * (parseFloat(speedEl.value) / 6);
          const r = Math.min(width, height) * 0.28;
          const ix = cx + Math.cos(idleAngle) * r;
          const iy = cy + Math.sin(idleAngle * 1.3) * r;
          emit(ix, iy);
        }

        ctx.globalCompositeOperation = 'lighter';
        particles.forEach((p) => {
          p.update();
          drawParticle(p);
        });
        ctx.globalCompositeOperation = 'source-over';

        particles = particles.filter((p) => !p.dead());
      }
      requestAnimationFrame(tick);
    }

    function pointerMove(x, y) {
      pointerActive = true;
      emit(x, y);
      clearTimeout(pointerMove._t);
      pointerMove._t = setTimeout(() => (pointerActive = false), 1500);
    }

    canvas.addEventListener('mousemove', (e) => pointerMove(e.clientX, e.clientY));
    canvas.addEventListener(
      'touchmove',
      (e) => {
        e.preventDefault();
        const t = e.touches[0];
        if (t) pointerMove(t.clientX, t.clientY);
      },
      { passive: false }
    );
    canvas.addEventListener('mousedown', (e) => pointerMove(e.clientX, e.clientY));

    randomizeBtn.addEventListener('click', () => {
      hueEl.value = Math.floor(Math.random() * 360);
      speedEl.value = Math.floor(2 + Math.random() * 18);
      sizeEl.value = Math.floor(4 + Math.random() * 30);
      symmetryEl.value = Math.floor(1 + Math.random() * 11);
      trailEl.value = Math.floor(1 + Math.random() * 29);
    });

    clearBtn.addEventListener('click', () => {
      ctx.fillStyle = '#0a0a12';
      ctx.fillRect(0, 0, width, height);
      particles = [];
    });

    pauseBtn.addEventListener('click', () => {
      paused = !paused;
      pauseBtn.textContent = paused ? '▶ Reanudar' : '⏸ Pausar';
    });

    saveBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = `arte-generativo-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    requestAnimationFrame(tick);
  </script>
</body>
</html>
